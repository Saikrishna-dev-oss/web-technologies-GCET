<!DOCTYPE html>
<html>
<head>
    <title>Event Handling Demo</title>
</head>
<body>
    <h2>JavaScript Event Demonstration</h2>

    <button id="clickBtn">Click Me</button>

    <p>Type here: <input type="text" id="keyInput"></p>

    <p>Department: 
        <select id="dept">
            <option value="None">--Select--</option>
            <option value="CSE">CSE</option>
            <option value="AIML">AIML</option>
        </select>
    </p>

    <div id="display" style="color: green; font-weight: bold; margin-top: 15px;"></div>

    <script>
        const display = document.getElementById('display');

        // 1. Mouse Event: Handle a click
        document.getElementById('clickBtn').addEventListener('click', function() {
            display.innerText = "Mouse Event: Button was clicked!";
        });

        // 2. Keyboard Event: Handle a key press
        document.getElementById('keyInput').addEventListener('keyup', function(e) {
            display.innerText = "Keyboard Event: You released the '" + e.key + "' key.";
        });

        // 3. Form Event: Handle a selection change
        document.getElementById('dept').addEventListener('change', function() {
            display.innerText = "Form Event: Department changed to " + this.value;
        });
    </script>
</body>
</html>
