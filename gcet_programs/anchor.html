<!DOCTYPE html>
<html>
<head>
    <title>Anchor Tag Demonstration</title>
</head>

<body>

    <h2>HTML Anchor Tag Demo</h2>

    <p>
        The <b>&lt;a&gt;</b> tag is used to create hyperlinks.
    </p>

    <!-- Link opening in the same tab (_self - default) -->
    <p>
        <a href="https://www.example.com" target="_self">
            Visit Example Website (Opens in same tab)
        </a>
    </p>

    <!-- Link opening in a new tab (_blank) -->
    <p>
        <a href="https://www.wikipedia.org" target="_blank">
            Visit Wikipedia (Opens in new tab)
        </a>
    </p>

    <p>
        <b>Note on Link Colors:</b><br>
        • Unvisited link → Blue & underlined<br>
        • Visited link → Purple & underlined<br>
        • Active link → Red & underlined
    </p>

</body>
</html>
