<!DOCTYPE html>
<html>
<head>
    <title>CSS Demonstration</title>

    <style>
        /* Universal Selector */
        * {
            font-family: Arial;
        }

        /* Element Selector */
        p {
            color: blue;
            text-align: center;
        }

        /* ID Selector */
        #special {
            color: red;
            font-size: 20px;
        }

        /* Class Selector */
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }

        /* Group Selector */
        h1, h2 {
            text-align: center;
            color: green;
        }
    </style>
</head>

<body>

    <h1>CSS Demonstration</h1>
    <h2>Types of CSS Selectors</h2>

    <p>This paragraph is styled using element selector.</p>

    <p id="special">This paragraph is styled using ID selector.</p>

    <p class="highlight">This paragraph is styled using class selector.</p>

    <p class="highlight">Multiple elements can share the same class.</p>

</body>
</html>
