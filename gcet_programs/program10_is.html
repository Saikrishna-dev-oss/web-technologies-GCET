<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Demo</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #ff4500;
            text-align: center;
        }

        p {
            color: #333333;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Internal CSS Example</h1>
    <p>This paragraph is styled using internal CSS written in the &lt;style&gt; tag.</p>

</body>
</html>
