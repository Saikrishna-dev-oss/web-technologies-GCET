<!DOCTYPE html>
<html>
<head>
    <title>Marquee Tag Demonstration</title>
</head>

<body>

    <h2>Marquee Tag with All Attributes</h2>

    <!-- Marquee demonstrating bgcolor, direction, loop, width, height, hspace, vspace -->
    <marquee 
        bgcolor="lightblue"
        direction="right"
        loop="3"
        width="70%"
        height="50px"
        hspace="20"
        vspace="15">

        This marquee demonstrates bgcolor, direction, loop, width, height, hspace and vspace attributes

    </marquee>

    <br><br>

    <!-- Vertical marquee example -->
    <marquee 
        bgcolor="lightgreen"
        direction="up"
        width="300px"
        height="120px"
        hspace="30"
        vspace="20">

        Vertical scrolling marquee example

    </marquee>

</body>
</html>
