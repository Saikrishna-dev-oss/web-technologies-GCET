<!DOCTYPE html>
<html>
<head>
    <title>Image Tag Demonstration</title>
</head>

<body>

    <h2>HTML Image Tag Demo</h2>

    <!-- Basic image with src and alt -->
    <p>Basic Image:</p>
    <img src="Poster.jpeg" alt="Sample Image">

    <br><br>

    <!-- Image with width and height -->
    <p>Image with Width and Height:</p>
    <img src="Poster.jpeg" alt="Image with size"
         width="200" height="150">

    <br><br>

    <!-- Image with border -->
    <p>Image with Border:</p>
    <img src="Poster.jpeg" alt="Image with border"
         border="3">

    <br><br>

    <!-- Image with horizontal and vertical spacing -->
    <p>Image with HSpace and VSpace:</p>
    <img src="Poster.jpeg" alt="Image with spacing"
         hspace="20" vspace="15">

    <br><br>

    <!-- Image alignment -->
    <p>Image Alignment:</p>
    <img src="Poste.jpeg" alt="Aligned image"
         align="right"  width="200" height="150">

</body>
</html>
