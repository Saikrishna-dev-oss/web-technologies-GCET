<!--function returning value-->

<html>
<head>
<script>
function concatenate(first, last) {
    return first + last;
}

function showResult() {
    var result = concatenate("Zara", " Ali");
    document.write(result);
}
</script>
</head>
<body>
<input type="button" value="Call Function" onclick="showResult()">
</body>
</html>
