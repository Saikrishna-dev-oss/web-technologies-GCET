<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<!--
    XHTML document starts here
    XHTML is case-sensitive and follows XML rules
-->

<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <!-- Title of the XHTML document -->
    <title>XHTML Complete Example</title>

    <!-- Meta tag must be properly closed -->
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>

<body>

    <!-- Heading tag written in lowercase -->
    <h1>XHTML Demonstration Page</h1>

    <!-- Paragraph tag with proper closing -->
    <p>
        This page is written using <strong>XHTML</strong>.
        XHTML is HTML redesigned as an XML application.
    </p>

    <!-- Image tag must be self-closed and attributes must be quoted -->
    <img src="Poster.jpeg" alt="XHTML Logo" width="150" height="100" />

    <!-- Line break must be self-closed -->
    <br />

    <!-- Anchor tag with lowercase attributes -->
    <p>
        Visit
        <a href="https://www.w3.org">W3C Website</a>
        for more details.
    </p>

    <!-- Unordered list -->
    <ul>
        <li>XHTML is case-sensitive</li>
        <li>All tags must be closed</li>
        <li>Attributes must be quoted</li>
    </ul>

    <!-- Form with properly nested elements -->
    <form action="submit.php" method="post">

        <!-- Label should not contain another label -->
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" />

        <br />

        <!-- Checkbox with full attribute form -->
        <input type="checkbox" id="agree" name="agree" checked="checked" />
        <label for="agree">I agree to the terms</label>

        <br />

        <!-- Submit button -->
        <input type="submit" value="Submit" />

    </form>

    <!-- Script tag using type attribute (language is deprecated) -->
    <script type="text/javascript">
        // JavaScript code
        document.write("This message is written using JavaScript in XHTML.");
    </script>

</body>

</html>
<!--
    XHTML document starts here
    XHTML is case-sensitive and follows XML rules
    ✔ DOCTYPE declared
✔ All tags in lowercase
✔ All tags properly closed
✔ Empty elements self-closed
✔ Attributes fully written and quoted
✔ Proper nesting of elements
✔ XML namespace included
✔ Uses type instead of language

 
-->
