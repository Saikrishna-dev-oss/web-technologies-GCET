<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
</head>
<body>
<h2>Calculator</h2>
<form action="cal" method="get">
    <label for="n1">First Number:</label>
    <input type="text" id="n1" name="n1" required><br><br>

    <label for="n2">Second Number:</label>
    <input type="text" id="n2" name="n2" required><br><br>

    <label>Operation:</label><br>
    <input type="radio" name="r1" value="add"> Add<br>
    <input type="radio" name="r1" value="sub"> Subtract<br>
    <input type="radio" name="r1" value="mul"> Multiply<br>
    <input type="radio" name="r1" value="div"> Divide<br>
    <input type="radio" name="r1" value="mod"> Modulus<br><br>

    <input type="submit" value="Calculate">
</form>
</body>
</html>
