<!DOCTYPE html>
<html>
<head><title>Image Events</title></head>
<body>

<h2>Hover or Click on the Image</h2>

<img src="krishna.jpg" 
     width="300" 
     height="400"
     onmouseover="showMessage()"
     onclick="showCoords(event)"
>

<p id="msg"></p>
<p id="coords"></p>

<script>
function showMessage() {
  document.getElementById("msg").innerHTML = "Mouse is over the image!";
}

function showCoords(e) {
  var x = e.clientX;
  var y = e.clientY;
  document.getElementById("coords").innerHTML = "X: " + x + ", Y: " + y;
}
</script>

</body>
</html>
