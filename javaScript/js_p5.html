<!-- Function Returning Value  -->
 <html>
    <head>
        <title>Function Call </title>
        <script>
            function concatenate(first,last) {
                return first+last
            }
            function showResult() {
                var result = concatenate("Bhagavathe ","Vasudevaya");
                document.write(result);
            }
        </script>
    </head>
    <body>
        <input type="button" value="Function Call" onclick="showResult()">
    </body>
 </html>
