<html>
    <head>
        <title>Function call with Parameters</title>
        <script>
            function sayhello(name,age) {
                document.write(name + " Age is "+age);
            }
        </script>
    </head>
    <body>
        <input type="button" value="Click me" onclick="sayhello('Vasudeva Krishna',30)">
    </body>
</html>
